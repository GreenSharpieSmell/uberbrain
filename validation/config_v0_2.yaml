spec_version: 0.2
project: uberbrain
run:
  run_id: "${DATE}_${GIT_SHA_SHORT}"
  seed: 42
  trials: 200
  confidence_level: 0.95
  output_dir: "results/${DATE}_${GIT_SHA_SHORT}"

claims:
  c1_sim1_verify:
    enabled: true
    metrics:
      - roc_auc
      - fnr_at_threshold
      - calibration_ece
      - ssim_delta
    pass_fail:
      roc_auc:
        op: ">="
        value: 0.90
      fnr_at_threshold:
        op: "<="
        value: 0.05
      ssim_vs_mse_auc_delta:
        op: ">="
        value: 0.03

  c2_sim2_oomphlap:
    enabled: true
    metrics:
      - ber
      - state_accuracy
      - confusion_matrix
      - effective_bits_per_symbol
    noise_grid:
      sigma: [0.00, 0.01, 0.02, 0.05, 0.08, 0.10]
      crosstalk: [0.00, 0.01, 0.03, 0.05]
    pass_fail:
      ber_at_sigma_0p05:
        op: "<="
        value: 0.01
      state_accuracy_at_sigma_0p05:
        op: ">="
        value: 0.99
      effective_capacity_gain_vs_single_channel:
        op: ">="
        value: 1.25

  c3_sim3_consolicant:
    enabled: true
    metrics:
      - precision
      - recall
      - f1
      - retained_value_score
      - regret
    pass_fail:
      f1:
        op: ">="
        value: 0.80
      regret_ratio_vs_age_only:
        op: "<="
        value: 0.50
      retained_value_vs_random:
        op: ">="
        value: 1.10

  c4_sim4_pipeline:
    enabled: true
    metrics:
      - end_to_end_success_rate
      - reliability_uplift_vs_ablation
      - runtime_cost
    ablations:
      - no_verify
      - no_correction_write
      - no_consolidate_bleach
    pass_fail:
      uplift_vs_each_ablation:
        op: ">"
        value: 0.00
      min_success_rate:
        op: ">="
        value: 0.90

adversarial_suite:
  enabled: true
  scenarios:
    sim1:
      - structured_perturbation_low_global_ssim_change
      - phase_jitter_burst
      - blur_plus_drop_patch
    sim2:
      - threshold_drift
      - correlated_channel_noise
      - single_channel_failure
    sim3:
      - non_scale_free_graph
      - label_shift
      - stale_fidelity_adversarial_labels
    sim4:
      - cascading_faults
      - partial_correction_failure

artifacts:
  write_csv: true
  write_json: true
  write_plots: true
  include_environment: true
  required_files:
    - config.json
    - metrics.csv
    - summary.json
    - environment.txt
