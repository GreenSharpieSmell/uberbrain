name: Uberbrain CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r sim/requirements.txt
        pip install pytest

    - name: Compile check — all sim files
      run: |
        python -m py_compile sim/sim1_holographic.py
        python -m py_compile sim/sim2_oomphlap.py
        python -m py_compile sim/sim3_consolicant.py
        python -m py_compile sim/sim4_pipeline.py
        python -m py_compile sim/sim1_v2_noise.py
        python -m py_compile sim/sim2_v2_crosstalk.py
        python -m py_compile benchmark.py
        echo "All files compile cleanly"

    - name: Run pytest suite
      run: |
        python -m pytest tests/test_simulations.py -v --tb=short

    - name: Run quick benchmark (smoke test)
      run: |
        python benchmark.py --quick --output benchmark_results_ci

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results-py${{ matrix.python-version }}
        path: benchmark_results_ci/
        retention-days: 30
